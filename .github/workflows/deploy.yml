name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Docker Images
        run: |
          docker build -t arshad441/location-service ./location-service
          docker build -t arshad441/ride-service ./ride-service
          docker build -t arshad441/matching-service ./matching-service

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Images
        run: |
          docker push arshad441/location-service
          docker push arshad441/ride-service
          docker push arshad441/matching-service